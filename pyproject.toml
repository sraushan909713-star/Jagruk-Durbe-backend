# pyproject.toml
# ─────────────────────────────────────────────────────────────
# Project configuration for the Jagruk Durbe backend.
# Currently only configures ruff; can grow to include other tools.
# ─────────────────────────────────────────────────────────────

[tool.ruff]
target-version = "py311"
src = ["app"]

# Exclude generated / vendor code so it isn't linted.
# Note: we exclude the entire `migrations/` folder, not just `versions/`:
#   - `versions/*.py` are auto-generated by Alembic
#   - `env.py` is the Alembic entry point and intentionally violates
#     E402 (imports below `from app.database import Base`) because models
#     must import AFTER Base is in scope to register with the metadata
extend-exclude = [
    "venv",
    "migrations",
    "__pycache__",
]

[tool.ruff.lint]
# Using ruff's default ruleset: E4 (import warnings), E7 (statements),
# E9 (syntax errors), F (pyflakes — unused imports, etc).
# We do NOT add E5 (line length) — long lines are common in chained
# SQLAlchemy filters and not worth refactoring.

# Ignored rules — each documented below.
ignore = [
    # E712 — "Avoid equality comparisons to True/False"
    # We use SQLAlchemy filters that REQUIRE `Model.column == True` to build
    # SQL WHERE clauses. The Pythonic alternative (`if x:`) does not generate
    # SQL — it evaluates the column object's truthiness, which is always True.
    # The `.is_(True)` form is equivalent but invasive to migrate (~85 sites).
    "E712",
    # E701 — "Multiple statements on one line (colon)"
    # We use one-line `if x is not None: field = x` idioms for compact PATCH
    # update logic; expanding them would harm readability.
    "E701",
]

# ─────────────────────────────────────────────────────────────
# Vulture config — dead-code finder
# ─────────────────────────────────────────────────────────────
[tool.vulture]
# 80% confidence filters out vulture's framework-magic false positives
# (FastAPI route handlers, Pydantic fields/validators, SQLAlchemy enum
#  members, etc) and leaves only genuinely-suspicious code.
min_confidence = 80
paths = ["app", ".vulture_allowlist.py"]

# ─────────────────────────────────────────────────────────────
# Bandit config — security linter
# ─────────────────────────────────────────────────────────────
[tool.bandit]
# B105 — "Possible hardcoded password" detector.
# False positives in our codebase:
#   - enum members like `pwd = "pwd"` (Public Works Department)
#   - enum members like `reset_password = "reset_password"` (OTPPurpose)
#   - OAuth2 spec literals `"token_type": "bearer"` in auth responses
# Real hardcoded passwords would still surface in code review; B105's
# substring heuristic is too noisy for projects with enums + OAuth2.
skips = ["B105"]

# ─────────────────────────────────────────────────────────────
# Mypy config — static type checker
# ─────────────────────────────────────────────────────────────
[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true   # libraries without type stubs (slowapi, etc)

# Error codes silenced — each documented below.
# All four fire overwhelmingly on framework-magic false positives.
# We accept losing the rare real bug these codes would catch in exchange
# for not drowning in ~140 false positives from SQLAlchemy 1.x descriptors.
#
# Long-term fix: migrate models to SQLAlchemy 2.x `Mapped[T]` annotations,
# at which point these codes can be re-enabled. Until then, Phase 3 manual
# review + runtime testing covers the gap.
disable_error_code = [
    # assignment — fires on `model.field = "value"` because SQLAlchemy 1.x
    # types `model.field` as `Column[T]` at the class level. At runtime
    # SQLAlchemy's descriptor unwraps to T. mypy can't see through this.
    "assignment",
    # arg-type — fires on `SomeResponse(field=model.field)`. Same root
    # cause: `model.field` looks like `Column[T]` to mypy but is `T` at
    # runtime. Affects every Pydantic response construction from an ORM row.
    "arg-type",
    # var-annotated — fires on enum-typed Column declarations
    # (`category = Column(Enum(...))`) because SQLAlchemy 1.x doesn't
    # auto-annotate as Mapped[]. Pure style; no runtime impact.
    "var-annotated",
    # call-arg — fires on `Settings()` (pydantic-settings auto-reads
    # required fields from environment variables, but mypy sees them as
    # missing required keyword args).
    "call-arg",
]
